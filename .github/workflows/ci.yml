name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (workspaces)
        run: npm run lint --if-present

      - name: Test (workspaces)
        run: npm test --if-present

      - name: Verify no banned tokens leak (hygiene guard)
        run: npm test --workspace @leapnux/branchnux -- cli.test.mjs

      - name: npm publish dry-run (manifest validation)
        run: npm publish --dry-run --workspaces --access=public

  lint-templates:
    name: Lint templates (security)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint templates for forbidden patterns
        run: npm run lint:templates --workspace @leapnux/branchnux
